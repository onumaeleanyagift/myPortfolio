name: Update Pull Requests

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node scripts/fetch-prs.js
        env:
          TOKEN_PR_GITHUB: ${{ secrets.TOKEN_PR_GITHUB }}

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add public/data/pull-requests.json

          git diff --cached --quiet || git commit -m "Update pull requests"

          git push